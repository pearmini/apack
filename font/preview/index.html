<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>APack Font Preview</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, sans-serif;
        background: #f6f6f6;
        color: #141414;
        padding: 2rem;
      }
      h1 {
        margin: 0 0 1rem;
        font-size: 1.5rem;
      }
      textarea {
        width: 100%;
        min-height: 5rem;
        padding: 0.75rem;
        font: inherit;
        border: 1px solid #ccc;
        border-radius: 8px;
        resize: vertical;
      }
      .controls {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(11rem, 1fr));
        gap: 0.75rem 1.25rem;
        margin: 1rem 0 0;
        padding: 1rem;
        background: white;
        border: 1px solid #ddd;
        border-radius: 8px;
      }
      .control {
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
        font-size: 0.8125rem;
        color: #444;
      }
      .control-row {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .control input[type="range"] {
        flex: 1;
        min-width: 0;
      }
      .control input[type="number"],
      .control select {
        width: 100%;
        padding: 0.35rem 0.5rem;
        font: inherit;
        border: 1px solid #ccc;
        border-radius: 6px;
      }
      .control output {
        min-width: 2.5rem;
        text-align: right;
        font-variant-numeric: tabular-nums;
        color: #666;
      }
      .preview {
        margin-top: 1rem;
        padding: 1.5rem;
        background: white;
        border-radius: 12px;
        border: 1px solid #ddd;
        font-family: "APack", monospace;
        font-size: 72px;
        font-weight: 400;
        font-style: normal;
        letter-spacing: 0;
        line-height: 1;
        word-spacing: 0;
        min-height: 8rem;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .hint {
        margin-top: 1rem;
        font-size: 0.875rem;
        color: #666;
      }
    </style>
  </head>
  <body>
    <h1>APack Font Preview</h1>
    <textarea id="input">hello world. the quick brown fox?</textarea>
    <div class="controls">
      <label class="control">
        Font size
        <div class="control-row">
          <input id="fontSize" type="range" min="16" max="160" value="72" />
          <output id="fontSizeOut">72px</output>
        </div>
      </label>
      <label class="control">
        Font weight
        <select id="fontWeight">
          <option value="300">Light (300)</option>
          <option value="400" selected>Regular (400)</option>
          <option value="500">Medium (500)</option>
          <option value="600">Semibold (600)</option>
          <option value="700">Bold (700)</option>
          <option value="800">Extra Bold (800)</option>
          <option value="900">Black (900)</option>
        </select>
      </label>
      <label class="control control-row">
        <input id="italic" type="checkbox" />
        Italic
      </label>
      <label class="control">
        Letter spacing
        <div class="control-row">
          <input id="letterSpacing" type="range" min="-0.1" max="0.5" step="0.01" value="0" />
          <output id="letterSpacingOut">0em</output>
        </div>
      </label>
      <label class="control">
        Word spacing
        <div class="control-row">
          <input id="wordSpacing" type="range" min="-0.2" max="1" step="0.01" value="0" />
          <output id="wordSpacingOut">0em</output>
        </div>
      </label>
      <label class="control">
        Line height
        <div class="control-row">
          <input id="lineHeight" type="range" min="0.8" max="2.5" step="0.05" value="1" />
          <output id="lineHeightOut">1</output>
        </div>
      </label>
    </div>
    <div id="preview" class="preview"></div>
    <p id="status" class="hint">Loading font…</p>
    <script type="module" src="./main.js"></script>
  </body>
</html>
